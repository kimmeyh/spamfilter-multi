name: my_email_spam_filter
description: Cross-platform email spam filter app
version: 0.5.6+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies (Phase 1)
  yaml: ^3.1.0
  provider: ^6.1.0
  logger: ^2.0.0
  intl: ^0.20.2

  # Phase 1 - IMAP Email Support (AOL MVP)
  enough_mail: ^2.1.7
  
  # Storage & Security (Phase 1)
  flutter_secure_storage: ^10.0.0  # (F108, Sprint 44: 9->10; encryptedSharedPreferences deprecated -> dropped; Android minSdk raised to 23)
  path_provider: ^2.1.0
  path: ^1.8.0

  # Phase 2 - Gmail Support (Native API) - activated
  googleapis: ^11.4.0
  google_sign_in: ^7.2.0
  
  # Phase 2 - Outlook/Office365 Support (Native API) - activated
  msal_auth: ^3.3.0
  http: ^1.1.0
  
  # Phase 2 Sprint 5 - Windows Gmail OAuth Support
  url_launcher: ^6.2.0  # For browser-based OAuth
  webview_flutter: ^4.4.0  # For WebView OAuth backup
  crypto: ^3.0.3  # For PKCE S256 (sha256)
  app_links: ^6.3.3  # For deep link handling on mobile OAuth
  flutter_appauth: ^12.0.1  # OAuth for Android/iOS (F108, Sprint 44: 8->12; we do not use preferEphemeralSession; Flutter 3.38.1+ satisfied)
  
  # Phase 3.5 - Database & Settings
  sqflite: ^2.3.0  # SQLite for scan results, rules, settings
  sqflite_common_ffi: ^2.3.0  # SQLite FFI for desktop platforms

  # Phase 3.5 Sprint 7 - Background Scanning
  workmanager: ^0.9.0  # Background task scheduling (Android/iOS) (F108, Sprint 44: 0.5->0.9; we use NetworkType.connected + a simple inputData map, unaffected by the enum renames / native-Map change)
  flutter_local_notifications: ^16.2.0  # Local notifications
  connectivity_plus: ^5.0.0  # Network connectivity detection
  battery_plus: ^5.0.0  # Battery level detection

  # Sprint 10 - Windows Desktop UI
  system_tray: ^2.0.3  # System tray integration (Windows/macOS/Linux)
  window_manager: ^0.3.7  # Window management (minimize to tray, etc.)
  file_picker: ^8.1.4  # File and folder picker (Sprint 13 - folder selection)
  punycode: ^1.0.0
  syncfusion_flutter_xlsio: ^33.1.44
  package_info_plus: ^9.0.1

  # Phase 2+ - UI Enhancement
  # flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.8

flutter:
  uses-material-design: true
  assets:
    - assets/rules/rules.yaml
    - assets/rules/rules_safe_senders.yaml

    # AOL IMAP CA certificate for custom SecurityContext
    - assets/certs/aol_ca.pem

    # Sprint 38 F85 (ADR-0038): user-facing content extracted from Dart source
    # to per-section Markdown files. Manifest at assets/content/manifest.yaml
    # maps content keys to .md paths.
    - assets/content/manifest.yaml
    - assets/content/audit-log.md
    - assets/content/help/select_account.md
    - assets/content/help/account_setup.md
    - assets/content/help/demo_scan.md
    - assets/content/help/manual_scan.md
    - assets/content/help/results_display.md
    - assets/content/help/scan_history.md
    - assets/content/help/settings.md
    - assets/content/help/general_rules_management.md
    - assets/content/help/general_scan_history_retention.md
    - assets/content/help/general_privacy_logging.md
    - assets/content/help/folder_settings.md
    - assets/content/help/manual_scan_settings.md
    - assets/content/help/background_scanning.md
    - assets/content/help/manage_rules.md
    - assets/content/help/rule_quick_add.md
    - assets/content/help/rule_test.md
    - assets/content/help/safe_senders.md
    - assets/content/help/folder_selection.md
    - assets/content/help/yaml_import_export.md
    - assets/content/help/other_ways_to_reduce_junk.md
    - assets/content/help/faq.md
    - assets/content/help/walkthrough.md

# MSIX Configuration for Windows Desktop
msix_config:
  display_name: MyEmailSpamFilter
  publisher_display_name: Kimmey Consulting - Ohio
  identity_name: KimmeyConsulting-Ohio.MyEmailSpamFilter
  publisher: CN=84EA8722-0CA5-4EC0-9B10-07EE79B66062
  msix_version: 0.5.6.0
  logo_path: assets/icon/icon.png
  capabilities: internetClient, internetClientServer, privateNetworkClientServer
  # For Store submission: store: true, install_certificate: false
  # For local MSIX testing: store: false, install_certificate: true
  store: true
  install_certificate: false
  # Forward dart-defines to the inner `flutter build windows` triggered by msix:create.
  # Required for prod Store builds: APP_ENV=prod (else the MSIX runs as dev --
  # [DEV] title/About + _Dev data dir, F119) + Gmail OAuth credentials from
  # secrets.prod.json (else silent Gmail sign-in failure).
  # F119 (Sprint 47): the correct key for the msix package (3.16.x) is
  # `windows_build_args`, NOT `build_windows_args`. The wrong key was silently
  # ignored, so the 0.5.4 Store MSIX shipped as dev with empty credentials.
  # See docs/STORE_RELEASE_PROCESS.md.
  windows_build_args: --dart-define=APP_ENV=prod --dart-define-from-file=secrets.prod.json

# Icon Generation Configuration
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    icon_size: 48
    image_path: "assets/icon/icon.png"
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#4196F3"
  adaptive_icon_foreground: "assets/icon/icon.png"
